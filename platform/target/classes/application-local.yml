spring:
  # MySQL Connection configuration
  datasource:
    url: jdbc:mysql://localhost:3306/backendsim?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        generate_statistics: true

  # DevTools live reload
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

# Local Log configuration
logging:
  level:
    root: INFO
    com.backendsim.platform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.results: TRACE
